version: "3.8"

services:
  # ─── Frontend: React + nginx ───────────────────────────────────────────────
  frontend:
    build:
      context: ./mi-app
      dockerfile: Dockerfile.prod
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

  # ─── Backend: Bun + Hono + PostgreSQL ─────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: ./api/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - ADMIN_USER=admin
      - ADMIN_PASSWORD=changeme
      - JWT_SECRET=cambia-este-secreto-en-produccion
      - DATABASE_URL=postgresql://admin:changeme@db:5432/cheatsheet
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── Base de datos: PostgreSQL ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=changeme
      - POSTGRES_DB=cheatsheet
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d cheatsheet"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  # Volumen persistente para PostgreSQL
  db-data:
    driver: local
